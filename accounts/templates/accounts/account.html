{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 40px auto;">
    
    <h2>Criar Candidatura</h2>

    {% if user.is_authenticated %}
        <form method="POST">
            {% csrf_token %}

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="job">Oferta de Trabalho</label>
                {{ form.job }}
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="status">Estado</label>
                {{ form.status }}
            </div>

            <button type="submit" class="btn btn-primary">Submeter Candidatura</button>
        </form>

    {% else %}
        <p>Precisas de estar autenticado para criar uma candidatura.</p>
        <a href="{% url 'login' %}">Iniciar sessão</a>
    {% endif %}

</div>
{% endblock %}
