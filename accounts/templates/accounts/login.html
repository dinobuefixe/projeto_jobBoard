 {% block content %}
<main>
    <h1>Login</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {{ form.as_p }}

        <button type="submit">Entrar</button>
    </form>

    <p>Don't have an account? <a href="{% url 'signup' %}">Register here</a>
</main>
{% endblock %}
