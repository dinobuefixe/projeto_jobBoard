{% extends "base.html" %}
{% block content %}
<main>
    <h1>Configurar Empresa</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success" type="submit">Guardar</button>
    </form>

    <a href="{% url 'account' pk=request.user.pk %}" class="btn btn-secondary">Voltar</a>
</main>
{% endblock %}
