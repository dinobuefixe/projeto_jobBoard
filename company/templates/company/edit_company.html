{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Configurar Empresa</h1>

    {% if company %}
        <p><strong>Empresa atual:</strong> {{ company.name }}</p>
    {% else %}
        <p>Ainda não tens uma empresa configurada. Cria-a agora.</p>
    {% endif %}

    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_name" class="form-label">Nome da Empresa</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label for="id_description" class="form-label">Descrição</label>
            {{ form.description }}
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</div>
{% endblock %}
