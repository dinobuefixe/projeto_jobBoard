<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dev Job Board{% endblock %}</title>
    </head>
<body>
    <nav>
        <a href="{% url 'home' %}"><strong>DevBoard</strong></a> |
        <a href="{% url 'index' %}">Jobs</a> |
        
        {% if user.is_authenticated %}
            <a href="{% url 'application_list' %}">My Tracker</a> |
            <span>Hi, {{ user.username }}</span>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}<button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'signup' %}">Register</a>
        {% endif %}
    </nav>

    <hr>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Dev Job Board Project</p>
    </footer>
</body>
</html>
