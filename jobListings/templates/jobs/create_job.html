{% extends "base.html" %}
{% block content %}
<main>
    <h1>Criar Oferta de Emprego</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Criar Oferta</button>
    </form>

    <a href="{% url 'account' pk=request.user.pk %}" class="btn btn-secondary">Voltar</a>
</main>
{% endblock %}
